["Chat System"]
	#Enable custom chat formatting system
	enableChatFormat = true
	#Player name format in chat
	#Variables: $prefix, $name, $suffix
	#$prefix = LuckPerms prefix
	#$name = player name or nickname
	#$suffix = LuckPerms suffix
	playerNameFormat = "$prefix $name $suffix"
	#Chat message format
	#Variables: $time, $name, $msg
	#$time = timestamp (if enabled)
	#$name = formatted player name
	#$msg = player's message
	#You can use color codes with §
	chatMessageFormat = "[$time] $name: $msg"
	#Global color for chat messages
	#Choose: AQUA, RED, LIGHT_PURPLE, YELLOW, WHITE, BLACK, GOLD,
	#GRAY, BLUE, GREEN, DARK_GRAY, DARK_AQUA, DARK_RED,
	#DARK_PURPLE, DARK_GREEN, DARK_BLUE
	chatMessageColor = "WHITE"
	#Show timestamp in chat messages
	enableTimestamp = true
	#Timestamp format (Java SimpleDateFormat)
	#Examples: HH:mm, HH:mm:ss, hh:mm a
	#Read more: https://docs.oracle.com/javase/7/docs/api/java/text/SimpleDateFormat.html
	timestampFormat = "HH:mm"
	#Enable markdown styling in chat
	#**bold**, *italic*, __underline__, ~~strikethrough~~
	markdownEnabled = true
	#Enable /colors command to show available colors
	enableColorsCommand = true
	#If 'true', logs private messages (/msg) to the server console.
	#Useful for moderation purposes.
	logPrivateMessages = false

["Join and Leave Messages"]
	#Enable custom join/leave messages.
	enableCustomJoinLeave = true
	#Join message. Variables: {player}, {nickname}
	#Use 'none' to disable join messages completely.
	joinMessage = "§e{player} §7joined the game"
	#Leave message. Variables: {player}, {nickname}
	#Use 'none' to disable leave messages completely.
	leaveMessage = "§e{player} §7left the game"
